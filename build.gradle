buildscript {
    repositories {
        google()
        mavenCentral()
        // هذا هو السطر الجديد الذي سيحل المشكلة
        gradlePluginPortal() 
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.1'
        classpath 'gradle.plugin.com.onesignal:onesignal-gradle-plugin:[0.12.10, 0.99.99]'
    }
}
allprojects {
    repositories {
        google()
        mavenCentral()
        // أضفناه هنا أيضاً للاحتياط
        gradlePluginPortal() 
    }
}
